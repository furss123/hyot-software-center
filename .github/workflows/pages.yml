name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'admin/**'
      - '**.md'
      - '.github/workflows/ci.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build
        run: |
          npm run build:icons
          npm run copy:software-assets
          npm run build:search-index
          npm run build:og
          npm run build:sitemap
          npm run build:rss
          npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ''
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      # GitHub Pages 배포가 "Deployment failed, try again later"로 간헐적으로
      # 실패하는 경우가 있어(인프라 쪽 일시적 오류), 최대 3번까지 재시도한다.
      # 평소(1차 시도 성공)에는 재시도 단계들이 전부 건너뛰어져 동작이 그대로다.
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy1
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before retry 1
        if: steps.deploy1.outcome == 'failure'
        run: sleep 15

      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before retry 2
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages (attempt 3, final)
        id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v5

      - name: Resolve deployment result
        id: deployment
        if: always()
        run: |
          if [ "${{ steps.deploy1.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.deploy1.outputs.page_url }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.deploy2.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.deploy2.outputs.page_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "page_url=${{ steps.deploy3.outputs.page_url }}" >> "$GITHUB_OUTPUT"
          fi
