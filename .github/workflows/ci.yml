name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run validate:schemas
      - run: npm run build:search-index
      - run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ''
      - name: Install Playwright
        run: npx playwright install chromium --with-deps
      - name: Start server
        run: npx serve out -p 3000 &
      - name: Wait for server
        run: npx wait-on http://localhost:3000/ko --timeout 30000
      - name: Check broken links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            ./out
            --base http://localhost:3000
            --exclude "github.com"
            --exclude "cdn.jsdelivr.net"
            --exclude "formspree.io"
            --exclude "supabase.co"
            --exclude "search_term_string"
            --exclude "pagead2.googlesyndication.com"
            --exclude-path ./out/feed.xml
            --exclude-path ./out/sitemap.xml
            --timeout 10
            --max-retries 2
            --accept 200,201,204,301,302,403,429
          fail: true
      - name: Accessibility check
        run: npm run test:a11y
      - name: Lighthouse CI
        run: npm run test:lighthouse
        continue-on-error: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
